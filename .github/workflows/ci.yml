name: FastAPI CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Unit Tests
  # ─────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📦 Install test dependencies
        run: pip install pytest httpx

      - name: ✅ Run unit tests
        run: pytest test_main.py -v --tb=short

      - name: 📊 Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: .pytest_cache/

  # ─────────────────────────────────────────────
  # JOB 2: Regressietests (Robot Framework)
  # ─────────────────────────────────────────────
  regression-tests:
    name: 🤖 Regression Tests (Robot Framework)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📦 Install Robot Framework dependencies
        run: pip install robotframework robotframework-requests

      - name: 🚀 Start FastAPI server
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          echo "Server gestart op http://127.0.0.1:8000"

      - name: 🔍 Health check
        run: curl -f http://127.0.0.1:8000/health

      - name: 🤖 Run Robot Framework regression tests
        run: |
          robot --outputdir tests/regression/results tests/regression/regression_tests.robot

      - name: 📊 Upload Robot Framework rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-regression-results
          path: tests/regression/results/

  # ─────────────────────────────────────────────
  # JOB 3: Build check
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: [unit-tests, regression-tests]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Start server en verificeer
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl -f http://127.0.0.1:8000/
          curl -f http://127.0.0.1:8000/health
          curl -f http://127.0.0.1:8000/personen
          echo "✅ Alle endpoints bereikbaar"

      - name: ✅ Pipeline geslaagd
        run: echo "🎉 Build, unit tests en regressietests zijn allemaal geslaagd!"
