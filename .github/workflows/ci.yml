name: FastAPI CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Unit Tests
  # ─────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📦 Install test dependencies
        run: pip install pytest httpx

      - name: ✅ Run unit tests
        run: pytest test_main.py -v --tb=short --junit-xml=test-results/unit-tests.xml

      - name: 📊 Upload unit test rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/

  # ─────────────────────────────────────────────
  # JOB 2: Regressietests (Robot Framework)
  # ─────────────────────────────────────────────
  regression-tests:
    name: 🤖 Regression Tests (Robot Framework)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📦 Install Robot Framework dependencies
        run: pip install robotframework robotframework-requests

      - name: 🚀 Start FastAPI server
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          echo "Server gestart op http://127.0.0.1:8000"

      - name: 🔍 Health check
        run: curl -f http://127.0.0.1:8000/health

      - name: 🤖 Run Robot Framework regression tests
        run: robot --outputdir tests/regression/results tests/regression/regression_tests.robot

      - name: 📊 Upload Robot Framework rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-regression-results
          path: tests/regression/results/
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 3: Build & Package artifact
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    needs: [unit-tests, regression-tests]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Start server en verificeer endpoints
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl -f http://127.0.0.1:8000/
          curl -f http://127.0.0.1:8000/health
          curl -f http://127.0.0.1:8000/personen
          echo "✅ Alle endpoints bereikbaar"

      - name: 🗂️ Maak deploy pakket aan
        run: |
          mkdir -p deploy
          cp main.py deploy/
          cp requirements.txt deploy/
          cp README.md deploy/
          echo "APP_VERSION=${{ github.sha }}" > deploy/.env
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deploy/.env
          echo "BRANCH=${{ github.ref_name }}" >> deploy/.env

      - name: 🗜️ Zip het deploy pakket
        run: |
          cd deploy
          zip -r ../fastapi-copilte-${{ github.sha }}.zip .
          cd ..
          echo "📦 Artifact aangemaakt: fastapi-copilte-${{ github.sha }}.zip"
          ls -lh fastapi-copilte-*.zip

      - name: 📤 Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastapi-copilte-deploy
          path: fastapi-copilte-${{ github.sha }}.zip
          retention-days: 90

      - name: ✅ Build geslaagd
        run: |
          echo "🎉 Pipeline volledig geslaagd!"
          echo "📦 Artifact beschikbaar onder: Actions > Artifacts > fastapi-copilte-deploy"
          echo "📥 Download en deploy met:"
          echo "   unzip fastapi-copilte-deploy.zip -d /opt/fastapi-copilte"
          echo "   cd /opt/fastapi-copilte"
          echo "   pip install -r requirements.txt"
          echo "   uvicorn main:app --host 0.0.0.0 --port 8000"

  # ─────────────────────────────────────────────
  # JOB 4: Deploy naar server (alleen main branch)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy naar server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: fastapi-copilte-deploy

      - name: 📋 Toon artifact inhoud
        run: |
          ls -lh
          unzip -l fastapi-copilte-${{ github.sha }}.zip

      - name: 🚀 Deploy naar server via SSH
        # Vul onderstaande GitHub Secrets in voor echte deployment:
        # Settings > Secrets > Actions:
        #   SERVER_HOST  → IP-adres of hostname van de server
        #   SERVER_USER  → SSH gebruikersnaam (bijv. ubuntu)
        #   SERVER_KEY   → Inhoud van de private SSH sleutel
        run: |
          echo "ℹ️  Deployment klaar - configureer SERVER_HOST, SERVER_USER en SERVER_KEY"
          echo "   in GitHub Secrets voor automatische SSH-deployment."
          echo ""
          echo "   Handmatig deployen:"
          echo "   1. Download artifact 'fastapi-copilte-deploy' van GitHub Actions"
          echo "   2. scp fastapi-copilte-deploy.zip user@server:/opt/"
          echo "   3. ssh user@server"
          echo "   4. cd /opt && unzip fastapi-copilte-deploy.zip -d fastapi-copilte"
          echo "   5. cd fastapi-copilte && pip install -r requirements.txt"
          echo "   6. uvicorn main:app --host 0.0.0.0 --port 8000 --daemon"
